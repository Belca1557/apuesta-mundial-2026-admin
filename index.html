<html lang="es"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Apuesta Mundial 2026 · Administración</title>
<style>
:root{--gold:#c9a227;--bg:#0e1626;--card:#172338;--line:#27344d;--txt:#e7ecf5;--mut:#93a1bd;
--green-bg:#123a23;--yellow-bg:#352a0e;--zero-bg:#202c42;--navy2:#1f3a5f;--head:#11203a;--red:#e0455e}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:14px}
.wrap{max-width:1500px;margin:0 auto;padding:18px}
header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;border-bottom:2px solid var(--gold);padding-bottom:14px;margin-bottom:16px}
h1{font-size:21px;margin:0;letter-spacing:.3px}h1 span{color:var(--gold)}
.sub{color:var(--mut);font-size:12px;margin-top:4px}
h2{font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px}
/* banner en vivo */
#live{display:none;background:linear-gradient(90deg,#2a0e15,#1a2233);border:1px solid var(--red);border-radius:12px;padding:11px 14px;margin-bottom:6px}
#live.on{display:block}
#live .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--red);margin-right:7px;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#live b{color:var(--red);letter-spacing:.5px;font-size:12px}
#live .m{font-size:15px;font-weight:700;margin-top:3px}
#live .m .sc{color:var(--gold)}
.rank{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:9px}
.rc{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px;position:relative}
.rc.lead{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.rc .pos{position:absolute;top:8px;right:10px;color:var(--mut);font-size:11px;font-weight:700}
.rc .nm{font-weight:700;font-size:13.5px;margin-bottom:2px}
.rc .pt{font-size:23px;font-weight:800;color:var(--gold);line-height:1}
.rc .pt small{font-size:11px;color:var(--mut);font-weight:600}
.rc .br{height:5px;background:var(--zero-bg);border-radius:4px;margin-top:8px;overflow:hidden}
.rc .br>i{display:block;height:100%;background:linear-gradient(90deg,#caa53a,#1f9d61)}
.rc .dt{font-size:10.5px;color:var(--mut);margin-top:6px}
.rc.hl{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}
.rc .livep{display:inline-block;margin-left:6px;font-size:10px;font-weight:700;color:#ffd0d7;background:#3a1620;border:1px solid var(--red);border-radius:6px;padding:1px 5px;vertical-align:middle}
.gol{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:640px}
.gc{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.gc .medal{font-size:24px}.gc.g1{border-color:var(--gold)}
.gc .gn{font-weight:700;font-size:14px}.gc .gt{color:var(--mut);font-size:11.5px}
.gc .gg{margin-left:auto;text-align:right}.gc .gg b{font-size:22px;color:var(--gold)}.gc .gg span{font-size:10px;color:var(--mut);display:block}
.note{color:var(--mut);font-size:11px;margin-top:6px}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:6px 0 4px}
select{background:var(--head);color:var(--txt);border:1px solid var(--line);padding:7px 10px;border-radius:8px;font-size:12.5px}
.prog{color:var(--mut);font-size:12px;margin-left:auto}
.tw{overflow:auto;max-height:74vh;border:1px solid var(--line);border-radius:12px;margin-top:6px}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px}
thead th{position:sticky;top:0;z-index:5;background:var(--head);border-bottom:2px solid var(--gold);padding:7px 6px;text-align:center;white-space:nowrap}
thead th .tp{font-size:16px;font-weight:800;color:var(--gold);line-height:1}
thead th .tn{font-size:11px;font-weight:600;color:var(--txt);margin-top:2px}
thead th.lead .tn{color:var(--gold)}
th.cnr{left:0;z-index:6;text-align:left;min-width:150px}
td.match{position:sticky;left:0;z-index:3;background:var(--card);text-align:left;min-width:150px;font-weight:600;white-space:nowrap}
td{padding:6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
tr.dh td{background:#0c1322;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-size:11px;position:sticky;left:0}
tr.liverow td.match{box-shadow:inset 3px 0 0 var(--red)}
.grp{display:inline-block;background:var(--navy2);color:#dfe7f5;border-radius:5px;padding:1px 6px;font-size:10.5px}
.real{font-weight:800}
.real .lv{background:#0c1322;border:1px solid var(--line);border-radius:6px;padding:2px 7px}
.real .pend{color:var(--mut);font-weight:600}
.real .lvlive{border-color:var(--red);color:#ffd0d7}
.real .tag{display:block;font-size:8.5px;color:var(--red);font-weight:700;letter-spacing:.5px;margin-top:2px}
.cell .sc{font-variant-numeric:tabular-nums}
.cell .tg{font-size:9px;opacity:.8;margin-left:2px}
.c3{background:var(--green-bg);color:#7ee0a5}.c1{background:var(--yellow-bg);color:#e6c766}.c0{background:var(--zero-bg);color:var(--mut)}.cx{color:var(--mut)}
.prov{outline:1px dashed var(--red);outline-offset:-3px}
tfoot td{position:sticky;bottom:0;background:var(--head);border-top:2px solid var(--gold);font-weight:800;color:var(--gold)}
tfoot td.match{background:var(--head);color:var(--txt);text-align:right}
</style></head><body><div class="wrap">

const PLAYERS=STATIC.players, MATCHES=STATIC.matches;
const FINAL=new Set(["FINISHED","AWARDED"]);
const LIVEST=new Set(["IN_PLAY","PAUSED"]);
let RES={matches:{},scorers:STATIC.scorers_fallback,updated:null};
const sign=x=>x>0?1:x<0?-1:0;
function ptsFor(pr,r){ if(!pr||!r)return null; if(pr[0]===r[0]&&pr[1]===r[1])return 3;
  return sign(pr[0]-pr[1])===sign(r[0]-r[1])?1:0; }
function realOf(id){const x=RES.matches[id]; return (x&&x.rl!=null&&x.rv!=null)?[x.rl,x.rv]:null;}
function statusOf(id){const x=RES.matches[id]; return x?x.st:null;}
function isFinal(id){return FINAL.has(statusOf(id));}
function isLive(id){return LIVEST.has(statusOf(id));}

function computeRank(){
 const rows=PLAYERS.map(p=>{let tot=0,ex=0,gn=0,ac=0,livePts=0,hasLive=false;
   MATCHES.forEach(m=>{ const fin=isFinal(m.id),liv=isLive(m.id);
     if(!fin&&!liv)return; const x=ptsFor(m.preds[p],realOf(m.id));
     if(x==null)return; tot+=x; if(x===3)ex++; else if(x===1)gn++; if(x>=1)ac++;
     if(liv){hasLive=true; livePts+=x;} });
   return {p,pts:tot,ex,gn,ac,livePts,hasLive};});
 rows.sort((a,b)=>b.pts-a.pts||b.ex-a.ex||b.gn-a.gn);
 return rows;
}
function renderRank(rows){
 const max=Math.max(1,rows[0].pts);let h='';
 rows.forEach((r,i)=>{h+=`<div class="rc ${i===0?'lead':''} ${r.hasLive?'hl':''}"><div class="pos">#${i+1}</div>
   <div class="nm">${r.p}</div><div class="pt">${r.pts}<small> pts</small>${r.hasLive?`<span class="livep">▲${r.livePts} en vivo</span>`:''}</div>
   <div class="br"><i style="width:${Math.round(r.pts/max*100)}%"></i></div>
   <div class="dt">${r.ex} exactos · ${r.gn} ganador · ${r.ac} aciertos</div></div>`;});
 document.getElementById('rank').innerHTML=h;
 return rows;
}
function renderScorers(){
 const m=['🥇','🥈','🥉'];let h='';(RES.scorers||[]).slice(0,3).forEach((s,i)=>{
  h+=`<div class="gc g${i+1}"><div class="medal">${m[i]}</div>
   <div><div class="gn">${s.n}</div><div class="gt">${s.t||''}</div></div>
   <div class="gg"><b>${s.g}</b><span>goles</span></div></div>`;});

}
function renderLive(){
 const el=document.getElementById('live');
 const lives=MATCHES.filter(m=>isLive(m.id));
 if(!lives.length){el.className='';el.innerHTML='';return;}
 let h='<b><span class="dot"></span>EN VIVO</b>';
 lives.forEach(m=>{const r=realOf(m.id)||[0,0];const mn=RES.matches[m.id].min;
   h+=`<div class="m">${m.local} <span class="sc">${r[0]} - ${r[1]}</span> ${m.visit}${mn?` · <span style="color:var(--mut)">${mn}</span>`:''}</div>`;});
 el.className='on';el.innerHTML=h;
}
function header(rows){
 const tot=Object.fromEntries(rows.map(r=>[r.p,r.pts]));const leader=rows[0].p;
 let h='<thead><tr><th class="cnr">Partido</th><th>Gpo</th><th>Resultado</th>';
 PLAYERS.forEach(p=>{h+=`<th class="${p===leader?'lead':''}"><div class="tp">${tot[p]}</div><div class="tn">${p}</div></th>`;});
 return h+'</tr></thead>';
}
function realCell(m){
 const r=realOf(m.id);
 if(isLive(m.id)&&r) return `<span class="lv lvlive">${r[0]} - ${r[1]}</span><span class="tag">EN VIVO</span>`;
 if(isFinal(m.id)&&r) return `<span class="lv">${r[0]} - ${r[1]}</span>`;

}
function render(){
 const rows=renderRank(computeRank());const tot=Object.fromEntries(rows.map(r=>[r.p,r.pts]));
 renderScorers();renderLive();
 const fd=document.getElementById('fDate').value, fg=document.getElementById('fGroup').value;

const RAW='https://raw.githubusercontent.com/Belca1557/apuesta-mundial-2026-admin/main/resultados.json';
let lastOk=Date.now();
async function load(){
 try{const r=await fetch(RAW+'?v='+Date.now(),{cache:'no-store'});
   if(r.ok){const j=await r.json();RES.matches=j.matches||{};if(j.scorers&&j.scorers.length)RES.scorers=j.scorers;RES.updated=j.updated||null;lastOk=Date.now();}
 }catch(e){console.warn('No se pudo cargar resultados.json',e);}
 render(); tickFresh();
}
function tickFresh(){
 const el=document.getElementById('fresh'); if(!el)return;
 if(!RES.updated){el.textContent='';return;}
 const d=new Date(RES.updated); if(isNaN(d)){el.textContent='';return;}
 const s=Math.max(0,Math.round((Date.now()-d.getTime())/1000));
 const rel = s<60?`hace ${s}s` : s<3600?`hace ${Math.floor(s/60)} min` : `hace ${Math.floor(s/3600)} h`;
 el.innerHTML=`<span style="color:#1f9d61">●</span> en vivo · datos actualizados ${rel}`;
}
(function init(){
 [...new Set(MATCHES.map(m=>m.fecha))].forEach(d=>document.getElementById('fDate').innerHTML+=`<option>${d}</option>`);
 [...new Set(MATCHES.map(m=>m.grupo))].sort().forEach(g=>document.getElementById('fGroup').innerHTML+=`<option>${g}</option>`);
 document.getElementById('fDate').onchange=render;document.getElementById('fGroup').onchange=render;
 load();
 setInterval(load, 60000);              // re-consulta datos cada 60s (en sitio, sin recargar)
 setInterval(tickFresh, 1000);          // contador "hace Xs" visible
 setInterval(()=>{ if(Date.now()-lastOk > 6*60000) location.reload(); }, 60000); // respaldo: si falla el fetch 6 min, recarga sola
})();
</script></body></html>
